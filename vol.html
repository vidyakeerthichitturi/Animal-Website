<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
  <style>
    body {
      background-color: #dcdcab;
      font-family: Arial, sans-serif;
      margin-left: 5px;
    }

    h1 {
      text-align: center;
      color: darkgreen;
    }

    form {
      width: 400px;
      margin: auto;
      padding: 20px;
      background-color: #f5f5dc;
      border-radius: 10px;
    }

    label {
      font-weight: bold;
    }

input[type="text"],
input[type="email"],
input[type="tel"],
textarea {
  margin-right: 5px;
  width: 95%;
  padding: 8px;
  margin-top: 3px;
  margin-bottom: 15px;
}
select {
  width: 250px;
  padding: 8px;
  border-radius: 5px;
  border: 1px solid #999;
}
.radio-group {
  margin: 10px 0;
}

.radio-group input {
  margin-left: 8px;
}
    button {
      padding: 10px 20px;
      background-color: darkgreen;
      color: white;
      border: none;
      cursor: pointer;
    }
    .h{
        text-align: center;
        color:rgb(39, 121, 39);
    }
  </style>
</head>
<body>

    <form action="vol2.html">
        <h1 class="h">Register Here!!</h1>
  <label >Name:</label>
  <input type="text" required>

  <label class="email">Email:</label>
  <input type="email" required>

  <label class="tel">Phone Number:</label>
  <input type="tel">

  <label class="Why">Why do you want to volunteer?</label>
  <textarea rows="4"></textarea>

  <label class="location" for="location">Preferred Volunteering Location:</label><br>

<select id="location" name="location">
  <option value="Select Location">Select Location</option>
  <option value="chennai">Chennai</option>
  <option value="bangalore">Bangalore</option>
  <option value="hyderabad">Hyderabad</option>
  <option value="delhi">Delhi</option>
  <option value="mumbai">Mumbai</option>
</select>
<br><br>
<label>Availability:</label>
<br>

<div class="radio-group">
  <label>
    <input type="radio" name="availability" value="part-time" required>
    Part Time
  </label>
</div>

<div class="radio-group">
  <label>
    <input type="radio" name="availability" value="full-time">
    Full Time
  </label>
</div>


  <button type="submit">Submit</button>
</form>
</body>
</html>
